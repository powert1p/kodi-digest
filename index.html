<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Коди Дайджест — AI для Есета</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 32px 24px;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 { font-size: 24px; color: #fff; font-weight: 700; }
    header p { color: #888; margin-top: 6px; font-size: 14px; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
    .digest-list { display: flex; flex-direction: column; gap: 12px; }
    .digest-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .digest-card:hover { border-color: #4a4aff; background: #1f1f2e; }
    .digest-date {
      font-size: 13px;
      color: #4a4aff;
      font-weight: 600;
      min-width: 70px;
    }
    .digest-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .digest-info p { font-size: 13px; color: #888; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
    }
    .badge.new { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
    .stats {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .stat {
      font-size: 11px;
      color: #666;
      padding: 2px 8px;
      background: #111;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Коди Дайджест</h1>
    <p>Ежедневный AI-дайджест — новости + возможности для применения</p>
  </header>
  <div class="container">
    <div class="digest-list">
      <a href="daily/2026-03-12.html" class="digest-card">
        <div class="digest-date">12 МАР</div>
        <div class="digest-info">
          <h3><span class="badge new">NEW</span> Claude Code /batch, GPT-5.4, ZuckerBot MCP</h3>
          <p>Мультиагентный ревью PR, параллельные worktrees, FB реклама через агентов</p>
          <div class="stats">
            <span class="stat">📰 14 новостей</span>
            <span class="stat">🎯 8 возможностей</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
