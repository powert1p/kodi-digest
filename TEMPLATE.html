<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DATE_TITLE}} — Коди Дайджест</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <div class="header-badge">◆ Коди Дайджест</div>
    <h1>{{DATE_TITLE}}</h1>
    <div class="header-meta">
      <span>{{ITEMS_COUNT}} карточек · {{READ_TIME}} мин</span>
    </div>
  </div>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Все выпуски</a>
    <div class="nav-links">
      <a href="../liked.html">❤️ Лайки</a>
      <a href="../backlog.html">📋 Бэклог</a>
    </div>
  </nav>

  <div class="container">

    <!-- ======== TL;DR (один viewport, без скролла) ======== -->
    <div class="tldr tldr-viewport fade-in-up">
      <div class="tldr-label">За 15 секунд</div>
      <ul>
        {{TLDR}}
      </ul>
    </div>

    <!-- ======== СЕКЦИЯ: АГЕНТСКИЙ КОДИНГ (3-5 карточек, ОБЯЗАТЕЛЬНАЯ) ======== -->
    <div class="section fade-in-up">
      <div class="section-header">
        <div class="section-title">🤖 AI & Агенты</div>
        <div class="section-line"></div>
      </div>
      {{AGENT_CARDS}}
    </div>

    <!-- ======== СЕКЦИЯ: НОВОСТИ (accordion) ======== -->
    <div class="section fade-in-up">
      <div class="section-header">
        <div class="section-title">📰 Новости</div>
        <div class="section-line"></div>
      </div>
      {{NEWS_CARDS}}
    </div>

    <!-- ======== СЕКЦИЯ: ВНЕДРИТЬ (полноразмерные карточки) ======== -->
    <div class="section fade-in-up">
      <div class="section-header">
        <div class="section-title">🛠 Внедрить</div>
        <div class="section-line"></div>
      </div>
      {{IMPLEMENT_CARDS}}
    </div>

    <!-- ======== СЕКЦИЯ: КОНТР-СИГНАЛ (красноватый акцент) ======== -->
    <div class="section fade-in-up">
      <div class="section-header">
        <div class="section-title">⚡ Контр-сигнал</div>
        <div class="section-line"></div>
      </div>
      {{COUNTER_SIGNAL}}
    </div>

  </div>

  <!-- Sticky панель фидбэка -->
  <div id="feedback-panel" class="feedback-panel">
    <div class="feedback-panel-inner">
      <div class="feedback-stats"></div>
      <div class="feedback-sync-status"></div>
    </div>
  </div>

  <script src="../js/feedback.js"></script>
  <script src="../js/app.js"></script>
  <script>
    initFeedbackButtons('{{DATE}}');
  </script>
</body>
</html>

<!--
  === ШАБЛОНЫ КАРТОЧЕК ===

  --- Accordion карточка (для секции Новости) ---
  <details class="accordion-card" data-card-id="card_N" data-card-title="TITLE" data-card-category="TAG">
    <summary class="accordion-summary">
      <span class="tag TAG_CLASS">TAG_EMOJI TAG_TEXT</span>
      <div class="accordion-summary-content">
        <div class="accordion-card-title">SHORT_TITLE</div>
        <div class="accordion-card-preview">PREVIEW_LINE</div>
      </div>
      <div class="accordion-chevron">▼</div>
    </summary>
    <div class="accordion-body">
      <div class="card-text">FULL_TEXT</div>
      <div class="card-action">
        <div class="card-action-label">Применить</div>
        <div class="card-action-text">ACTION_TEXT</div>
      </div>
      <div class="card-source"><a href="URL">SOURCE</a></div>
      <div class="feedback-buttons">
        <button class="feedback-btn" data-card-id="card_N" data-action="like">👍</button>
        <button class="feedback-btn" data-card-id="card_N" data-action="dislike">👎</button>
        <button class="feedback-btn" data-card-id="card_N" data-action="backlog">📋 В бэклог</button>
      </div>
    </div>
  </details>

  --- Полноразмерная карточка (для секций Агенты и Внедрить) ---
  <div class="card implement-card" data-card-id="impl_N" data-card-title="TITLE" data-card-category="🛠 ВНЕДРИТЬ">
    <div class="card-num"><span class="tag TAG_CLASS">TAG</span></div>
    <div class="card-title">TITLE</div>
    <div class="card-text">TEXT</div>
    <div class="card-action">
      <div class="card-action-label">Одно действие</div>
      <div class="card-action-text">ACTION</div>
    </div>
    <div class="feedback-buttons">
      <button class="feedback-btn" data-card-id="impl_N" data-action="like">👍</button>
      <button class="feedback-btn" data-card-id="impl_N" data-action="dislike">👎</button>
      <button class="feedback-btn" data-card-id="impl_N" data-action="backlog">📋 В бэклог</button>
    </div>
  </div>

  --- Контр-сигнал карточка (красный акцент) ---
  <details class="accordion-card risk-card" data-card-id="risk_N" data-card-title="TITLE" data-card-category="⚡ КОНТР-СИГНАЛ">
    <summary class="accordion-summary">
      <span class="tag risk">⚡ РИСК</span>
      <div class="accordion-summary-content">
        <div class="accordion-card-title">SHORT_TITLE</div>
        <div class="accordion-card-preview">PREVIEW</div>
      </div>
      <div class="accordion-chevron">▼</div>
    </summary>
    <div class="accordion-body">
      <div class="card-text">FULL_TEXT</div>
      <div class="card-risk">
        <div class="card-risk-label">Контр-сигнал</div>
        <div class="card-risk-text">RISK_TEXT</div>
      </div>
      <div class="feedback-buttons">
        <button class="feedback-btn" data-card-id="risk_N" data-action="like">👍</button>
        <button class="feedback-btn" data-card-id="risk_N" data-action="dislike">👎</button>
        <button class="feedback-btn" data-card-id="risk_N" data-action="backlog">📋 В бэклог</button>
      </div>
    </div>
  </details>

  === ПЛЕЙСХОЛДЕРЫ ===
  {{DATE}}              — YYYY-MM-DD (для JS)
  {{DATE_TITLE}}        — "14 марта 2026" (для заголовка)
  {{ITEMS_COUNT}}       — число карточек
  {{READ_TIME}}         — минуты чтения
  {{TLDR}}              — 3 пункта <li>...</li>
  {{AGENT_CARDS}}       — 3-5 полноразмерных карточек агентов
  {{NEWS_CARDS}}        — 15-20 accordion карточек
  {{IMPLEMENT_CARDS}}   — 3-5 полноразмерных карточек "внедрить"
  {{COUNTER_SIGNAL}}    — 1-2 risk-card с красным акцентом
-->
