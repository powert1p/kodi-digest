<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дайджест {{DATE}} — Коди</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
    header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 40px; border-bottom: 1px solid #2a2a4a; }
    header h1 { font-size: 24px; color: #fff; font-weight: 700; }
    header .meta { color: #888; margin-top: 8px; font-size: 13px; display: flex; gap: 16px; }
    .nav { background: #111; padding: 12px 40px; border-bottom: 1px solid #222; }
    .nav a { color: #4a4aff; text-decoration: none; font-size: 13px; }
    .nav a:hover { text-decoration: underline; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .section { margin-bottom: 40px; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #222; }
    .section-icon { font-size: 24px; }
    .section-title { font-size: 18px; font-weight: 700; color: #fff; }
    .items { display: flex; flex-direction: column; gap: 12px; }
    .item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px 20px; }
    .item:hover { border-color: #3a3a5a; }
    .item-text { font-size: 14px; line-height: 1.6; color: #ddd; }
    .item-source { margin-top: 8px; }
    .item-source a { color: #4a4aff; font-size: 12px; text-decoration: none; }
    .item-source a:hover { text-decoration: underline; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 6px; }
    .tag.action { background: #1a3a2a; color: #4caf50; border: 1px solid #4caf50; }
    .tag.info { background: #1a2a3a; color: #64b5f6; border: 1px solid #64b5f6; }
    .tag.hot { background: #3a1a1a; color: #ff6b35; border: 1px solid #ff6b35; }
    .action-block { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 10px; padding: 20px; margin-top: 40px; }
    .action-block h3 { color: #4caf50; font-size: 16px; margin-bottom: 12px; }
    .action-block ul { list-style: none; }
    .action-block li { padding: 6px 0; font-size: 14px; border-bottom: 1px solid #2a3a2a; }
    .action-block li:last-child { border-bottom: none; }
    .action-block li::before { content: "→ "; color: #4caf50; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Коди Дайджест</h1>
    <div class="meta">
      <span>📅 {{DATE_RU}}</span>
      <span>🔢 {{ITEMS_COUNT}} новостей</span>
    </div>
  </header>
  <nav class="nav">
    <a href="../index.html">← Все дайджесты</a>
  </nav>
  <div class="container">
    {{CONTENT}}
    {{ACTION_ITEMS}}
  </div>
</body>
</html>
