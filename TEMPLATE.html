<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дайджест {{DATE}} — Коди</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.6; }
    header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 28px 24px; border-bottom: 1px solid #2a2a4a; }
    header h1 { font-size: 20px; color: #fff; font-weight: 700; }
    header .meta { color: #888; margin-top: 6px; font-size: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
    .nav { background: #111; padding: 10px 24px; border-bottom: 1px solid #222; }
    .nav a { color: #4a4aff; text-decoration: none; font-size: 13px; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

    /* TL;DR */
    .tldr { background: linear-gradient(135deg, #1a2a3a 0%, #1a1a2e 100%); border: 1px solid #2a4a6a; border-radius: 12px; padding: 20px; margin-bottom: 28px; }
    .tldr-label { font-size: 11px; font-weight: 700; color: #64b5f6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .tldr ul { list-style: none; }
    .tldr li { font-size: 14px; color: #ddd; padding: 4px 0; padding-left: 20px; position: relative; }
    .tldr li::before { content: '→'; position: absolute; left: 0; color: #64b5f6; }

    /* Карточка */
    .item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .item:hover { border-color: #3a3a5a; }
    .item-num { font-size: 11px; font-weight: 700; color: #4a4aff; margin-bottom: 4px; }
    .item-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .item-text { font-size: 13px; color: #bbb; margin-bottom: 8px; }
    .item-us { background: #0f1a0f; border-left: 3px solid #4caf50; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 8px; }
    .item-us-label { font-size: 10px; font-weight: 700; color: #4caf50; text-transform: uppercase; letter-spacing: 0.5px; }
    .item-us-text { font-size: 13px; color: #aaa; margin-top: 2px; }
    .item-source { font-size: 11px; }
    .item-source a { color: #4a4aff; text-decoration: none; }
    .item-source a:hover { text-decoration: underline; }
    .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 4px; }
    .tag.hot { background: #3a1a1a; color: #ff6b35; }
    .tag.tool { background: #2a1a3a; color: #ce93d8; }
    .tag.biz { background: #3a3a1a; color: #ffd54f; }
    .tag.warn { background: #3a2a1a; color: #ff9800; }

    @media (max-width: 600px) {
      header { padding: 20px 16px; }
      .container { padding: 16px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Коди Дайджест</h1>
    <div class="meta">
      <span>📅 {{DATE_RU}}</span>
      <span>⏱ {{READ_TIME}} мин чтения</span>
      <span>📰 {{ITEM_COUNT}} пунктов</span>
    </div>
  </header>
  <nav class="nav"><a href="../index.html">← Все дайджесты</a></nav>
  <div class="container">
    <div class="tldr">
      <div class="tldr-label">TL;DR — 30 секунд</div>
      <ul>
        {{TLDR_ITEMS}}
      </ul>
    </div>
    {{ITEMS}}
  </div>
</body>
</html>
